version: '3.8'
services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_API_KEY=dev-key-123
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data: